<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Tool Soi Acc - Nam Dev</title>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: sans-serif; padding: 20px; text-align: center; }
        .main { background: #161b22; padding: 20px; border-radius: 10px; max-width: 500px; margin: auto; border: 1px solid #30363d; }
        #log { text-align: left; background: #000; height: 200px; overflow-y: auto; padding: 10px; margin-top: 20px; font-size: 13px; color: #39ff14; }
        .dl-btn { display: none; margin-top: 20px; padding: 10px; background: #238636; color: #fff; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="main">
        <h3>SOI BAN LIÊN QUÂN LIVE</h3>
        <input type="file" id="inpFile" accept=".txt">
        <button id="btn" style="margin-top:10px; cursor:pointer">BẮT ĐẦU QUÉT</button>
        <div id="log">Chờ lệnh...</div>
        <a id="dl" class="dl-btn" href="#" download>TẢI FILE ACC SỐNG (.TXT)</a>
    </div>
    <script>
        document.getElementById('btn').onclick = async () => {
            const file = document.getElementById('inpFile').files[0];
            if(!file) return alert("Chọn file .txt đã Nam!");
            const formData = new FormData();
            formData.append('file', file);
            document.getElementById('log').innerHTML = "Đang soi live... Đợi tí nhé!<br>";
            const res = await fetch('/scan', { method: 'POST', body: formData });
            const result = await res.json();
            result.data.forEach(i => {
                document.getElementById('log').innerHTML += `[+] ${i.acc} -> ${i.st}<br>`;
            });
            if(result.download) {
                document.getElementById('dl').href = result.download;
                document.getElementById('dl').style.display = 'block';
            }
        };
    </script>
</body>
</html>
