<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LQ Live Checker - Nam Dev</title>
    <style>
        body { background: #0b0e11; color: #e1e1e1; font-family: sans-serif; padding: 20px; display: flex; justify-content: center; }
        .card { background: #15191c; padding: 25px; border-radius: 12px; width: 100%; max-width: 450px; border: 1px solid #2b2f36; }
        h2 { color: #f0b90b; margin-top: 0; }
        .btn { background: #f0b90b; color: #000; border: none; padding: 12px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #log { background: #000; color: #02c076; padding: 10px; height: 250px; overflow-y: auto; margin: 15px 0; border-radius: 4px; font-size: 13px; text-align: left; }
        .dl-box { display: none; background: #2b2f36; padding: 10px; border-radius: 6px; }
        .dl-box a { color: #f0b90b; display: block; margin: 5px 0; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>SOI BAN LIVE</h2>
        <input type="file" id="f" accept=".txt" style="width:100%">
        <button class="btn" id="b">BẮT ĐẦU SOI</button>
        <div id="log">Đang chờ file...</div>
        <div id="dl" class="dl-box">
            <b>TẢI ACC SỐNG:</b>
            <a id="c" href="#" download>Dạng tk:mk</a>
            <a id="p" href="#" download>Dạng tk|mk</a>
        </div>
    </div>
    <script>
        document.getElementById('b').onclick = async () => {
            const file = document.getElementById('f').files[0];
            if(!file) return alert("Chưa chọn file!");
            const fd = new FormData(); fd.append('file', file);
            document.getElementById('log').innerHTML = "Đang kết nối Garena để soi...<br>";
            const res = await fetch('/scan', { method: 'POST', body: fd });
            const result = await res.json();
            document.getElementById('log').innerHTML = "";
            result.data.forEach(i => {
                document.getElementById('log').innerHTML += `[+] ${i.acc} -> ${i.st}<br>`;
            });
            if(result.dlColon) {
                document.getElementById('dl').style.display = 'block';
                document.getElementById('c').href = result.dlColon;
                document.getElementById('p').href = result.dlPipe;
            }
        };
    </script>
</body>
</html>
